name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prettier check
        working-directory: ui
        run: pnpm run format:check

      - name: Run ESLint
        working-directory: ui
        run: pnpm run lint

      - name: Build app
        working-directory: ui
        run: pnpm run build

      - name: Run tests
        working-directory: ui
        run: pnpm test
       